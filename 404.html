<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <title>Page Not Found - LG Appliance Repair New Jersey</title>

  <!-- Redirect -->
  <meta http-equiv="refresh" content="1.5; url=https://lgappliancerepairnj.com/" />

  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f9fa;
      color: #333;
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #c00;
    }
    p {
      font-size: 18px;
      margin-bottom: 25px;
    }
    a.home-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #0066cc;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
    }
    a.home-btn:hover {
      background: #004c99;
    }
  
        .county-item {
            cursor: pointer;
            font-weight: 600 !important;
            background: rgba(0,48,135,0.3) !important;
        }
        .county-item:hover {
            background: var(--red) !important;
        }
        .county-towns {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: rgba(0, 0, 0, 0.25);
            margin: 0 15px 8px;
            border-radius: 6px;
        }
        .county-towns.open {
            max-height: 1500px;
            overflow-y: auto;
        }
        .county-towns li {
            padding: 10px 25px !important;
            font-size: 15px !important;
            margin: 0 !important;
            line-height: 1.6 !important;
        }
        .county-towns li a {
            color: #ccc !important;
        }
        .county-towns li:hover {
            background: var(--red) !important;
        }
        .county-towns li:hover a {
            color: white !important;
        }
    </style>
</head>
<body>

  <h1>Oops! Page Not Found</h1>
  <p>We're redirecting you to the LG Appliance Repair New Jersey homepage.</p>

  <a class="home-btn" href="https://lgappliancerepairnj.com/">Go to Homepage</a>

  <script>
    setTimeout(function() {
      window.location.href = "https://lgappliancerepairnj.com/";
    }, 1500);
  </script>

<script>
    document.querySelectorAll(".county-item").forEach(function(item) {
        item.addEventListener("click", function(e) {
            e.stopPropagation();
            var countyId = this.getAttribute("data-county");
            var townsList = document.getElementById(countyId);
            if (townsList) {
                document.querySelectorAll(".county-towns").forEach(function(ct) {
                    if (ct.id !== countyId) ct.classList.remove("open");
                });
                townsList.classList.toggle("open");
            }
        });
    });
</script>
</body>
</html>
